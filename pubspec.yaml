name: lisa_app
description: Offline Voice Assistant Lisa
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_tts: ^4.2.5
  speech_to_text: ^7.4.0

  battery_plus: ^6.2.1
  connectivity_plus: ^6.1.0

  torch_light: ^1.1.0
  volume_controller: ^3.4.4

  url_launcher: ^6.3.0
  android_intent_plus: ^6.0.0

  shared_preferences: ^2.3.0

  vibration: ^3.1.3

  permission_handler: ^11.3.1

  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/asset/image/
    - lib/asset/sounds/
