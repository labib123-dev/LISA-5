name: lisa_app
description: LISA - Offline Voice Assistant
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Voice
  flutter_tts: ^4.2.5
  speech_to_text: ^7.4.0

  # Device control
  torch_light: ^1.1.0
  volume_controller: ^3.4.4
  battery_plus: ^6.2.1
  connectivity_plus: ^6.1.0
  vibration: ^3.1.3

  # Intent & Launch
  android_intent_plus: ^6.0.0
  url_launcher: ^6.3.0

  # Permission & Notification
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1

  # Storage
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/images/
    - lib/assets/sounds/
